<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MCU Doomsday Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .offline-container {
      text-align: center;
      max-width: 500px;
    }
    
    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #00ff88;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2rem;
    }
    
    .offline-features {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    
    .offline-features h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #ffd700;
    }
    
    .offline-features ul {
      list-style: none;
      padding: 0;
    }
    
    .offline-features li {
      padding: 0.5rem 0;
      padding-left: 1.5rem;
      position: relative;
    }
    
    .offline-features li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #00ff88;
      font-weight: bold;
    }
    
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #8b0000, #c41e3a);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(139, 0, 0, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .status.online {
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. But don't worry - your MCU watchlist data is saved locally!</p>
    
    <div class="offline-features">
      <h2>Available Offline:</h2>
      <ul>
        <li>View your watchlist</li>
        <li>Mark titles as watched</li>
        <li>Track your progress</li>
        <li>Browse cached posters</li>
        <li>Read trivia & Easter eggs</li>
      </ul>
    </div>
    
    <button class="btn" onclick="tryReconnect()">Try to Reconnect</button>
    
    <div class="status" id="status">
      Checking connection...
    </div>
  </div>
  
  <script>
    // Check online status
    function updateStatus() {
      const status = document.getElementById('status');
      if (navigator.onLine) {
        status.textContent = '✓ Back online! Redirecting...';
        status.classList.add('online');
        setTimeout(() => {
          window.location.href = './index.html';
        }, 1000);
      } else {
        status.textContent = '✕ Still offline. Your data is safe locally.';
        status.classList.remove('online');
      }
    }
    
    function tryReconnect() {
      updateStatus();
      if (navigator.onLine) {
        window.location.href = './index.html';
      }
    }
    
    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    
    // Initial check
    updateStatus();
    
    // Periodic check every 5 seconds
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
