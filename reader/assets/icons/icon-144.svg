<svg width="144" height="144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#8b0000"/>
  
  <!-- Outer circle (gold) -->
  <circle cx="72" cy="72" r="58" fill="none" stroke="#ffd700" stroke-width="7"/>
  
  <!-- Stylized "A" for Avengers -->
  <g>
    <!-- Triangle -->
    <polygon points="72,36 48,108 96,108" fill="#ffd700"/>
    <!-- Horizontal bar -->
    <rect x="56" y="78" width="32" height="10" fill="#8b0000"/>
    <!-- Inner circle cutout -->
    <circle cx="72" cy="72" r="24" fill="#8b0000"/>
  </g>
  
  <!-- Text "MCU" at bottom -->
  <text x="72" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffd700" text-anchor="middle">MCU</text>
</svg>

